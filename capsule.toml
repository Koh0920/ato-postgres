# `ato/postgres@16` — provider capsule for RFC CAPSULE_DEPENDENCY_CONTRACTS.md
#
# Implements `service@1` contract. Consumers declare:
#
#   [dependencies.db]
#   capsule  = "capsule://github.com/Koh0920/ato-postgres@<40-char-sha>"
#   contract = "service@1"
#   parameters.database = "myapp"
#   credentials.password = "{{env.PG_PASSWORD}}"
#   [dependencies.db.state]
#   name = "data"
#
# Postgres binaries come from ato-cli's verified tool artifact resolver
# (#119/#120). The capsule declares `tool_artifacts = ["postgresql"]`
# under [targets.server]; ato-cli ≥ 0.5.x downloads, sha256-verifies,
# and unpacks the pinned distribution into $ATO_HOME/store/tools/...,
# then injects ATO_TOOL_INITDB / POSTGRES / PG_CTL into the provider
# environment. There is no host /opt/homebrew or /usr/local dependency.

schema_version = "0.3"
name           = "postgres"
version        = "16.1.0"
type           = "app"
default_target = "server"

[metadata]
display_name = "PostgreSQL (capsule provider)"
description  = "Postgres 16 exposed as an Ato service@1 provider — clean-host via verified tool artifact"
author       = "ato"

[targets.server]
runtime  = "source"
driver   = "native"
# Wrapper script handles initdb-once + exec postgres. {{state.dir}} expands
# to <ato_home>/state/<parent>/<instance>/<state.version>/<state.name>/.
# {{credentials.password}} is the M1 TempFile path the orchestrator
# materializes the password into; we pass that path through to initdb's
# --pwfile so the secret never appears in argv or env.
# {{port}} is allocated by the orchestrator (orchestrator MVP treats
# port=None on the parsed NamedTarget as port="auto").
run = "./bootstrap.sh {{state.dir}} {{port}} {{credentials.password}}"
working_dir = "."
# Declare the postgresql tool artifact. ato-cli (≥ 0.5.x) resolves it
# from its built-in registry against an Ato-managed verified download
# and exposes the binaries through ATO_TOOL_* env. No host package
# manager dependency.
tool_artifacts = ["postgresql"]

# Inject the target database name via env so the bootstrap script can
# decide whether to create the database on first init. The script reads
# ATO_PG_DATABASE.
[targets.server.env]
ATO_PG_DATABASE = "wasedap2p"

[contracts."service@1"]
target = "server"
# Native "accepting connections" probe — orchestration-layer drop-in
# for `pg_isready`. ato-cli sends a Postgres v3 StartupMessage and
# treats Authentication{Ok,CleartextPassword,MD5Password,SASL*},
# ReadyForQuery, and auth-class ErrorResponse (SQLSTATE 28xxx) as
# accepting; ECONNREFUSED, read timeout, SQLSTATE 57P03
# (cannot_connect_now), and protocol violations as not-ready. See
# crates/ato-cli/src/application/dependency_runtime/ready.rs in
# ato-run/ato for the full classification.
ready  = { type = "postgres", host = "127.0.0.1", port = "{{port}}", user = "postgres", database = "postgres", timeout = "30s" }

[contracts."service@1".parameters]
database = { type = "string", required = true }
encoding = { type = "string", default = "utf8" }

[contracts."service@1".credentials]
password = { type = "string", required = true }

[contracts."service@1".identity_exports]
database = "{{params.database}}"
encoding = "{{params.encoding}}"
protocol = "postgresql"
major    = "16"

[contracts."service@1".runtime_exports]
PGHOST = "{{host}}"
PGPORT = "{{port}}"

[contracts."service@1".runtime_exports.DATABASE_URL]
value  = "postgresql+psycopg://postgres:{{credentials.password}}@{{host}}:{{port}}/{{params.database}}"
secret = true

[contracts."service@1".state]
required = true
version  = "16"
mount    = "/var/lib/postgresql/data"
